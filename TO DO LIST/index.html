<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <p class="eyebrow">Today &middot; <span id="today"></span></p>
        <h1>My Tasks</h1>
      </div>
      <button id="clearAll" class="ghost danger" aria-label="Clear all tasks">Clear A
        ll</button>
    </header>
    

    <section class="compo1ser" aria-label="Add a new task">
      <input id="taskInput" type="text" placeholder="What needs to be done?" maxlength="120" autocomplete="off">
      <select id="prioritySelect" aria-label="Priority">
        <option value="normal">Normal</option>
        <option value="high">High</option>
        <option value="low">Low</option>
      </select>
      <button id="addBtn" class="primary">Add</button>
    </section>

    <section class="controls" aria-label="Task filters">
      <div class="filters" role="group" aria-label="Filter tasks">
        <button data-filter="all" class="chip active">All</button>
        <button data-filter="active" class="chip">Active</button>
        <button data-filter="completed" class="chip">Completed</button>
      </div>
      <button id="clearCompleted" class="ghost">Clear Completed</button>
    </section>

    <ul id="todoList" class="todo-list" aria-live="polite"></ul>

    <section class="howto" aria-label="How to use">
      <h2>Quick start</h2>
      <ol>
        <li>Type a task and press <strong>Add</strong> (or Enter).</li>
        <li>Pick a priority if it matters.</li>
        <li>Click the checkbox to complete, or the filter chips to view.</li>
        <li>Double-click a task to rename it. Use <strong>Del</strong> to remove.</li>
      </ol>
    </section>

    <footer class="footer">
      <p id="summary">0 tasks</p>
      <p class="hint">Tip: double-click a task to edit.</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
